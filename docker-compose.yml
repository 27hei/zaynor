# Zaynor — full stack.
#   1. Copy .env.deploy.example to .env and fill in the values.
#   2. docker compose up --build
# Frontend: http://localhost:8080   API: http://localhost:5286

services:
  api:
    build: ./backend
    ports:
      - "5286:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Data Source=/data/zaynor.db
      - Jwt__Issuer=Zaynor
      - Jwt__Audience=ZaynorClient
      # REQUIRED: a long random secret; the API refuses to start without it.
      - Jwt__Key=${JWT_KEY:?Set JWT_KEY in .env}
      # The public origin the browser loads the frontend from.
      - Cors__Origins__0=${FRONTEND_ORIGIN:-http://localhost:8080}
    volumes:
      - zaynor-data:/data
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        # The public URL the browser reaches the API at.
        VITE_API_URL: ${API_URL:-http://localhost:5286}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  zaynor-data:
